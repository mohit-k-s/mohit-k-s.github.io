<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English+SC&family=Inconsolata:wght@400;500&display=swap"
        rel="stylesheet">

    {{ $style := resources.Get "custom.css" | resources.Minify }}
    <link rel="stylesheet" href="{{ $style.Permalink }}">

    <!-- Restore theme before paint to avoid flash -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <span id="theme-icon">☽</span>
    </button>

    <header>
        <div class="site-header">
            <a href="/" class="site-title">{{ .Site.Title }}</a>
            <nav class="site-nav">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}">{{ .Name }}</a>
                {{ end }}
            </nav>
        </div>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        {{ .Site.Params.madeWith | markdownify }}
    </footer>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');
        const html = document.documentElement;

        function applyTheme(dark) {
            html.setAttribute('data-theme', dark ? 'dark' : 'light');
            icon.textContent = dark ? '☀' : '☽';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }

        // Set correct icon on load
        applyTheme(localStorage.getItem('theme') === 'dark');

        toggle.addEventListener('click', () => {
            applyTheme(html.getAttribute('data-theme') !== 'dark');
        });
    </script>
</body>

</html>
